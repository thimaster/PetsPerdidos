<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pet Lost - Sistema de Upload</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        select, input { padding: 8px; width: 300px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .sucesso { color: #155724; background: #d4edda; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        .galeria { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 30px; }
        .card { border: 1px solid #eee; padding: 10px; text-align: center; width: 180px; box-shadow: 2px 2px 5px #eee; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; }
        .card span { font-size: 11px; color: #555; word-break: break-all; }
    </style>
</head>
<body>
    <h1>Registrar Pet Desaparecido</h1>
    <!-- Feedback de Sucesso -->
    <div th:if="${mensagem}" id="msg-sucesso" class="sucesso">
        <strong th:text="${mensagem}"></strong>
        <p>Deseja cadastrar outro pet? Basta preencher o formulário abaixo.</p>
	    <!-- Botão de Fechar -->
	    <button type="button" onclick="document.getElementById('msg-sucesso').style.display='none'" class="btn-fechar">
	        &times;
	    </button>
    </div>
    <form th:action="@{/upload}" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label>Tipo de Pet:</label>
			<select name="tipoPet">
			    <option value="CAO">Cão</option>
			    <option value="AVE">Ave</option>
			    <option value="REPTIL">Réptil</option>
			</select>
        </div>
        <div class="form-group">
            <label>Nome do Pet:</label>
            <input type="text" name="nome" required placeholder="Ex: Rex Silva">
        </div>
        <div class="form-group">
            <label>Data de Nascimento:</label>
            <input type="date" name="dataNascimento" required>
        </div>
        <div class="form-group">
            <label>Data do Sumiço:</label>
            <input type="date" name="dataOcorrido" required>
        </div>
        <div class="form-group">
            <label>Onde sumiu?</label>
            <input type="text" name="local" required placeholder="Ex: Bairro Centro">
        </div>
        <div class="form-group">
            <label>Foto do Pet:</label>
            <input type="file" name="imagem" accept="image/*" required>
        </div>
        <button type="submit">Enviar Registro</button>
    </form>
    <hr style="margin-top: 40px;">
    <h2>Galeria de Uploads (Imagens no Servidor)</h2>
    <div class="galeria">
        <div th:each="arq : ${arquivos}" class="card">
            <!-- Usa o mapeamento do WebConfig para carregar a imagem -->
            <img th:src="@{'/ver-img/' + ${arq}}" alt="Foto do Pet">
            <br>
            <span th:text="${arq}"></span>
        </div>
        <p th:if="${#lists.isEmpty(arquivos)}">Nenhuma imagem enviada ainda.</p>
    </div>
</body>
</html>
